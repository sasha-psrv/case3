<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Слайдер изображений</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="slider-container">
        <div class="slider">
            <div class="slide-wrapper">
                <div class="slide">
                    <img src="https://via.placeholder.com/800x400?text=Изображение+1" alt="Изображение 1">
                </div>
                <div class="slide">
                    <img src="https://via.placeholder.com/800x400?text=Изображение+2" alt="Изображение 2">
                </div>
                <div class="slide">
                    <img src="https://via.placeholder.com/800x400?text=Изображение+3" alt="Изображение 3">
                </div>
                <div class="slide">
                    <img src="https://via.placeholder.com/800x400?text=Изображение+4" alt="Изображение 4">
                </div>
            </div>
        </div>
        
        <div class="controls">
            <button class="prev-btn">❮</button>
            <span class="current-info">Изображение 1 из 4</span>
            <button class="next-btn">❯</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
